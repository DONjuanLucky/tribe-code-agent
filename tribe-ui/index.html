<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tribe — Agent Control Panel</title>
  <meta name="description" content="Tribe Code Agent Control Panel — manage your AI agent, channels, and workflows">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="shell">

    <!-- TOPBAR -->
    <header class="topbar">
      <a href="#" class="logo" onclick="App.showView('overview');return false">
        <span class="logo-wordmark">Tribe</span>
        <span class="logo-sep"></span>
        <span class="logo-badge">Control Panel</span>
      </a>
      <div class="topbar-right">
        <span class="topbar-mode">Local</span>
        <span class="status-pill">
          <span class="status-dot-off"></span>&nbsp;Gateway Offline
        </span>
      </div>
    </header>

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <button class="nav-btn active" data-view="overview">Dashboard</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Communication</div>
        <button class="nav-btn" data-view="chat">Chat</button>
        <button class="nav-btn" data-view="channels">Channels</button>
        <button class="nav-btn" data-view="commands">Commands</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Agent</div>
        <button class="nav-btn" data-view="agent">Identity &amp; Model</button>
        <button class="nav-btn" data-view="workspace">Workspace</button>
        <button class="nav-btn" data-view="settings">Settings &amp; Automation</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Multi-Agent</div>
        <button class="nav-btn" data-view="antfarm">Antfarm</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">System</div>
        <button class="nav-btn" data-view="gateway">Gateway</button>
        <button class="nav-btn" data-view="logs">Logs</button>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main" id="main-content">
      <div class="content">
        <div class="empty-state">Loading…</div>
      </div>
    </main>

  </div>

  <!-- MODAL -->
  <div class="backdrop" id="cmd-backdrop">
    <div class="modal">
      <div class="modal-hd">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" id="modal-close">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <style>
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--txt);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--r);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .03em;
      z-index: 300;
      transform: translateY(60px);
      opacity: 0;
      transition: all .28s var(--ease);
      pointer-events: none;
      box-shadow: var(--shadow-lg);
      max-width: 300px
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    .toast.toast-error {
      background: var(--red)
    }

    .toast.toast-success {
      background: var(--green)
    }
  </style>

  <script src="app.js"></script>
</body>

</html>
